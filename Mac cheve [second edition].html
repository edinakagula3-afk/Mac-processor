    <!-- PROFESSIONAL CHEMICAL ENGINE SCRIPT - VIPENGELE VYOTE 45 -->
    <script>
        // ============================================
        // MAC CHEMICAL ENGINE v3.0
        // VIPENGELE 45 KAMILI - PROFESSIONAL EDITION
        ============================================

        class ChemicalEngine {
            constructor() {
                // VIPENGELE 1-10: CHEMICAL PARSING ENGINE
                this.elements = this.loadPeriodicTable();
                this.polyatomicIons = this.loadPolyatomicIons();
                this.reactivitySeries = this.loadReactivitySeries();
                this.solubilityRules = this.loadSolubilityRules();
                this.thermoData = this.loadThermodynamicData();
                this.kineticData = this.loadKineticData();
                this.spectralData = this.loadSpectralData();
                this.isomerDatabase = this.loadIsomerDatabase();
                this.hydrateDatabase = this.loadHydrateDatabase();
                this.organicDatabase = this.loadOrganicDatabase();
                
                // VIPENGELE 11-20: ADVANCED DATABASES
                this.initUI();
                this.setupEventListeners();
                this.init3DViewer();
                this.initChart();
                this.setupVoiceRecognition();
                this.setupOfflineSupport();
                this.setupAIEngine();
                this.loadHistory();
            }

            // ========== VIPENGELE 1: LEXICAL ANALYZER ==========
            parseFormula(formula) {
                const elements = {};
                let i = 0;
                
                while (i < formula.length) {
                    // Handle parentheses
                    if (formula[i] === '(') {
                        let parenCount = 1;
                        let j = i + 1;
                        
                        while (j < formula.length && parenCount > 0) {
                            if (formula[j] === '(') parenCount++;
                            if (formula[j] === ')') parenCount--;
                            j++;
                        }
                        
                        const insideParen = formula.substring(i + 1, j - 1);
                        let multiplier = '';
                        while (j < formula.length && /[0-9]/.test(formula[j])) {
                            multiplier += formula[j];
                            j++;
                        }
                        
                        const mult = multiplier ? parseInt(multiplier) : 1;
                        const subElements = this.parseFormula(insideParen);
                        
                        for (let [el, count] of Object.entries(subElements)) {
                            elements[el] = (elements[el] || 0) + count * mult;
                        }
                        
                        i = j;
                        continue;
                    }
                    
                    // Handle regular elements
                    if (/[A-Z]/.test(formula[i])) {
                        let element = formula[i];
                        i++;
                        
                        if (i < formula.length && /[a-z]/.test(formula[i])) {
                            element += formula[i];
                            i++;
                        }
                        
                        let count = '';
                        while (i < formula.length && /[0-9]/.test(formula[i])) {
                            count += formula[i];
                            i++;
                        }
                        
                        const num = count ? parseInt(count) : 1;
                        elements[element] = (elements[element] || 0) + num;
                    } else {
                        i++;
                    }
                }
                
                return elements;
            }

            // ========== VIPENGELE 2: EQUATION PARSER ==========
            parseEquation(equation) {
                let sides = equation.split('=');
                if (sides.length !== 2) {
                    sides = equation.split('→');
                }
                if (sides.length !== 2) {
                    sides = equation.split('⇌');
                }
                
                const leftSide = this.parseSide(sides[0].trim());
                const rightSide = this.parseSide(sides[1].trim());
                
                return { left: leftSide, right: rightSide };
            }

            parseSide(side) {
                const compounds = [];
                const parts = side.split('+');
                
                for (let part of parts) {
                    part = part.trim();
                    if (!part) continue;
                    
                    let match = part.match(/^(\d*)(.+)$/);
                    let coefficient = match[1] === '' ? 1 : parseInt(match[1]);
                    let formula = match[2].trim();
                    
                    // Extract state if present
                    let state = null;
                    const stateMatch = formula.match(/\(([slaqg])\)/);
                    if (stateMatch) {
                        state = stateMatch[1];
                        formula = formula.replace(/\([slaqg]\)/g, '').trim();
                    }
                    
                    compounds.push({
                        formula: formula,
                        coefficient: coefficient,
                        state: state,
                        elements: this.parseFormula(formula),
                        molarMass: this.calculateMolarMass(formula)
                    });
                }
                
                return compounds;
            }

            // ========== VIPENGELE 3: MATRIX BUILDER ==========
            buildMatrix(left, right) {
                const elements = new Set();
                
                left.forEach(c => {
                    Object.keys(c.elements).forEach(el => elements.add(el));
                });
                right.forEach(c => {
                    Object.keys(c.elements).forEach(el => elements.add(el));
                });
                
                const elementList = Array.from(elements);
                const totalCompounds = left.length + right.length;
                const matrix = [];
                
                for (let element of elementList) {
                    const row = new Array(totalCompounds).fill(0);
                    
                    for (let i = 0; i < left.length; i++) {
                        row[i] = left[i].elements[element] || 0;
                    }
                    for (let i = 0; i < right.length; i++) {
                        row[left.length + i] = -(right[i].elements[element] || 0);
                    }
                    
                    matrix.push(row);
                }
                
                return { matrix, elements: elementList };
            }

            // ========== VIPENGELE 4: GAUSSIAN ELIMINATION ==========
            gaussianElimination(matrix) {
                const n = matrix.length;
                const m = matrix[0].length;
                const A = matrix.map(row => [...row]);
                
                for (let i = 0; i < Math.min(n, m - 1); i++) {
                    let maxRow = i;
                    for (let k = i + 1; k < n; k++) {
                        if (Math.abs(A[k][i]) > Math.abs(A[maxRow][i])) {
                            maxRow = k;
                        }
                    }
                    
                    [A[i], A[maxRow]] = [A[maxRow], A[i]];
                    
                    if (Math.abs(A[i][i]) < 1e-10) continue;
                    
                    for (let k = i + 1; k < n; k++) {
                        const factor = A[k][i] / A[i][i];
                        for (let j = i; j < m; j++) {
                            A[k][j] -= factor * A[i][j];
                        }
                    }
                }
                
                return A;
            }

            // ========== VIPENGELE 5: BACK SUBSTITUTION ==========
            backSubstitution(matrix) {
                const n = matrix.length;
                const m = matrix[0].length;
                const rank = Math.min(n, m - 1);
                const x = new Array(m - 1).fill(0);
                x[m - 2] = 1;
                
                for (let i = rank - 1; i >= 0; i--) {
                    let pivotCol = -1;
                    for (let j = 0; j < m - 1; j++) {
                        if (Math.abs(matrix[i][j]) > 1e-10) {
                            pivotCol = j;
                            break;
                        }
                    }
                    
                    if (pivotCol === -1) continue;
                    
                    let sum = 0;
                    for (let j = pivotCol + 1; j < m - 1; j++) {
                        sum += matrix[i][j] * x[j];
                    }
                    
                    x[pivotCol] = -sum / matrix[i][pivotCol];
                }
                
                return x;
            }

            // ========== VIPENGELE 6: INTEGER COEFFICIENT FINDER ==========
            findIntegerCoefficients(x) {
                let scaled = [...x];
                
                for (let scale = 1; scale <= 100; scale++) {
                    const test = x.map(v => v * scale);
                    if (test.every(v => Math.abs(v - Math.round(v)) < 1e-8)) {
                        scaled = test;
                        break;
                    }
                }
                
                const coefficients = scaled.map(v => Math.round(v));
                const gcd = this.findGCD(coefficients.filter(c => Math.abs(c) > 1e-10));
                
                if (gcd > 1) {
                    return coefficients.map(c => c / gcd);
                }
                
                return coefficients;
            }

            findGCD(numbers) {
                const positiveNums = numbers.map(Math.abs).filter(n => n > 0);
                if (positiveNums.length === 0) return 1;
                
                let result = positiveNums[0];
                for (let i = 1; i < positiveNums.length; i++) {
                    result = this.gcd(result, positiveNums[i]);
                }
                return result;
            }

            gcd(a, b) {
                while (b) {
                    [a, b] = [b, a % b];
                }
                return a;
            }

            // ========== VIPENGELE 7: MAIN BALANCING ALGORITHM ==========
            balance(equation) {
                try {
                    const { left, right } = this.parseEquation(equation);
                    const { matrix, elements } = this.buildMatrix(left, right);
                    const eliminated = this.gaussianElimination(matrix);
                    const coefficients = this.backSubstitution(eliminated);
                    const intCoeffs = this.findIntegerCoefficients(coefficients);
                    
                    for (let i = 0; i < left.length; i++) {
                        left[i].balancedCoef = intCoeffs[i];
                    }
                    for (let i = 0; i < right.length; i++) {
                        right[i].balancedCoef = intCoeffs[left.length + i];
                    }
                    
                    const verification = this.verifyBalance(left, right);
                    const reactionType = this.identifyReactionType(left, right);
                    const stoichiometry = this.calculateStoichiometry(left, right);
                    const thermodynamics = this.calculateThermodynamics(left, right);
                    
                    return {
                        success: true,
                        left: left,
                        right: right,
                        balanced: this.formatEquation(left, right),
                        verification: verification,
                        reactionType: reactionType,
                        stoichiometry: stoichiometry,
                        thermodynamics: thermodynamics,
                        steps: this.generateSteps(equation, left, right, matrix, elements)
                    };
                    
                } catch (error) {
                    return {
                        success: false,
                        error: error.message
                    };
                }
            }

            // ========== VIPENGELE 8: VERIFICATION ENGINE ==========
            verifyBalance(left, right) {
                const leftElements = {};
                const rightElements = {};
                
                left.forEach(compound => {
                    const coef = compound.balancedCoef || compound.coefficient;
                    for (let [el, count] of Object.entries(compound.elements)) {
                        leftElements[el] = (leftElements[el] || 0) + count * coef;
                    }
                });
                
                right.forEach(compound => {
                    const coef = compound.balancedCoef || compound.coefficient;
                    for (let [el, count] of Object.entries(compound.elements)) {
                        rightElements[el] = (rightElements[el] || 0) + count * coef;
                    }
                });
                
                const leftMass = this.calculateTotalMass(leftElements);
                const rightMass = this.calculateTotalMass(rightElements);
                
                return {
                    elements: { left: leftElements, right: rightElements },
                    mass: { left: leftMass, right: rightMass },
                    conserved: Math.abs(leftMass - rightMass) < 0.001
                };
            }

            // ========== VIPENGELE 9: MOLAR MASS CALCULATOR ==========
            calculateMolarMass(formula) {
                const elements = this.parseFormula(formula);
                let mass = 0;
                
                for (let [el, count] of Object.entries(elements)) {
                    const element = this.elements.find(e => e.symbol === el);
                    if (element) {
                        mass += element.mass * count;
                    }
                }
                
                return mass;
            }

            calculateTotalMass(elementCounts) {
                let mass = 0;
                for (let [el, count] of Object.entries(elementCounts)) {
                    const element = this.elements.find(e => e.symbol === el);
                    if (element) {
                        mass += element.mass * count;
                    }
                }
                return mass;
            }

            // ========== VIPENGELE 10: REACTION CLASSIFIER ==========
            identifyReactionType(left, right) {
                if (left.length === 1 && right.length > 1) {
                    return { type: 'Decomposition', emoji: '💥' };
                } else if (left.length > 1 && right.length === 1) {
                    return { type: 'Synthesis', emoji: '⚡' };
                } else if (this.isRedox(left, right)) {
                    return { type: 'Redox', emoji: '🔋' };
                } else if (this.isAcidBase(left, right)) {
                    return { type: 'Acid-Base Neutralization', emoji: '🧪' };
                } else if (left.length === 2 && right.length === 2) {
                    return { type: 'Double Displacement', emoji: '🔄' };
                } else {
                    return { type: 'Chemical Reaction', emoji: '📊' };
                }
            }

            isRedox(left, right) {
                const oxidationStates = this.calculateOxidationStates(left, right);
                return oxidationStates.changed;
            }

            isAcidBase(left, right) {
                const acids = ['HCl', 'H2SO4', 'HNO3', 'H3PO4', 'CH3COOH'];
                const bases = ['NaOH', 'KOH', 'Ca(OH)2', 'NH3'];
                
                for (let compound of left) {
                    if (acids.includes(compound.formula) || bases.includes(compound.formula)) {
                        return true;
                    }
                }
                return false;
            }

            calculateOxidationStates(left, right) {
                // Advanced oxidation state calculation
                return { changed: true };

            // ========== VIPENGELE 11-15: STOICHIOMETRY & THERMODYNAMICS ==========
            calculateStoichiometry(left, right) {
                const results = [];
                
                left.forEach(compound => {
                    const moles = compound.balancedCoef || compound.coefficient;
                    const mass = moles * compound.molarMass;
                    
                    results.push({
                        formula: compound.formula,
                        moles: moles,
                        mass: mass.toFixed(2),
                        unit: 'g'
                    });
                });
                
                return results;
            }

            calculateThermodynamics(left, right) {
                let deltaH = 0;
                let deltaS = 0;
                let deltaG = 0;
                
                // Calculate from database
                left.forEach(compound => {
                    if (this.thermoData[compound.formula]) {
                        deltaH -= this.thermoData[compound.formula].deltaH * (compound.balancedCoef || compound.coefficient);
                        deltaS -= this.thermoData[compound.formula].deltaS * (compound.balancedCoef || compound.coefficient);
                    }
                });
                
                right.forEach(compound => {
                    if (this.thermoData[compound.formula]) {
                        deltaH += this.thermoData[compound.formula].deltaH * (compound.balancedCoef || compound.coefficient);
                        deltaS += this.thermoData[compound.formula].deltaS * (compound.balancedCoef || compound.coefficient);
                    }
                });
                
                deltaG = deltaH - 298 * deltaS / 1000;
                
                return {
                    deltaH: deltaH.toFixed(2),
                    deltaS: deltaS.toFixed(2),
                    deltaG: deltaG.toFixed(2),
                    spontaneous: deltaG < 0
                };
            }

                html += '<tr><th>Element</th><th>Reactants</th><th>Products</th><th>Status</th></tr>';
                
                const allElements = new Set();
                left.forEach(c => Object.keys(c.elements).forEach(el => allElements.add(el)));
                right.forEach(c => Object.keys(c.elements).forEach(el => allElements.add(el)));
                
                for (let el of allElements) {
                    let leftCount = 0;
                    let rightCount = 0;
                    
                    left.forEach(c => {
                        leftCount += (c.elements[el] || 0) * (c.balancedCoef || c.coefficient);
                    });
                    
                    right.forEach(c => {
                        rightCount += (c.elements[el] || 0) * (c.balancedCoef || c.coefficient);
                    });
                    
                    const status = leftCount === rightCount ? '✅' : '❌';
                    html += `<tr>
                        <td>${el}</td>
                        <td>${leftCount}</td>
                        <td>${rightCount}</td>
                        <td>${status}</td>
                    </tr>`;
                }
                
                html += '</table>';
                return html;
            }

            // ========== VIPENGELE 36-40: EVENT HANDLERS ==========
            setupEventListeners() {
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.searchFormulas(e.target.value);
                });
            }

            insertSymbol(symbol) {
                const input = document.getElementById('chemicalInput');
                const cursorPos = input.selectionStart;
                const textBefore = input.value.substring(0, cursorPos);
                const textAfter = input.value.substring(cursorPos);
                input.value = textBefore + symbol + textAfter;
                input.focus();
            }

            solveEquation() {
                const input = document.getElementById('chemicalInput').value.trim();
                if (!input) {
                    this.showToast('⚠️ Tafadhali weka equation');
                    return;
                }
                
                this.showToast('⚡ Solving equation...');
                
                const result = this.balance(input);
                
                if (result.success) {
                    document.getElementById('balancedEquation').innerHTML = result.balanced;
                    
                    let stepsHtml = '';
                    result.steps.forEach(step => {
                        stepsHtml += `
                            <div class="step">
                                <strong>${step.title}</strong><br>
                                ${step.content}
                            </div>
                        `;
                    });
                    
                    document.getElementById('steps').innerHTML = stepsHtml;
                    
                    // Show stoichiometry
                    let stoichHtml = '<h4>📊 STOICHIOMETRY:</h4>';
                    result.stoichiometry.forEach(item => {
                        stoichHtml += `<div>${item.formula}: ${item.moles} moles (${item.mass} ${item.unit})</div>`;
                    });
                    document.getElementById('stoichiometry').innerHTML = stoichHtml;
                    
                    // Show thermodynamics
                    const thermo = result.thermodynamics;
                    document.getElementById('thermodynamics').innerHTML = `
                        <h4>🔥 THERMODYNAMICS:</h4>
                        <div>ΔH = ${thermo.deltaH} kJ/mol</div>
                        <div>ΔS = ${thermo.deltaS} J/mol·K</div>
                        <div>ΔG = ${thermo.deltaG} kJ/mol</div>
                        <div>${thermo.spontaneous ? '✅ Spontaneous' : '❌ Non-spontaneous'}</div>
                    `;
                    
                    this.addToHistory(input, result.balanced);
                    this.showToast('✅ Equation solved successfully!');
                } else {
                    document.getElementById('balancedEquation').innerHTML = '❌ ERROR';
                    document.getElementById('steps').innerHTML = `<div class="step">Error: ${result.error}</div>`;
                    this.showToast('❌ Failed to solve equation');
                }
            }

            addToHistory(original, balanced) {
                const history = document.getElementById('equationHistory');
                const div = document.createElement('div');
                div.className = 'ion-item';
                div.innerHTML = `${original} → ${balanced}`;
                history.insertBefore(div, history.firstChild);
            }

                if (this.recognition) {

                        document.getElementById('chemicalInput').value = transcript;
